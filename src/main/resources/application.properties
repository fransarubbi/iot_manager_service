spring.application.name=iot_manager_service

# --- CONEXION A POSTGRESQL ---
spring.datasource.url=jdbc:postgresql://localhost:5432/iot_manager_db
spring.datasource.username=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.profiles.include=secrets

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# --- PERFORMANCE Y CONCURRENCIA ---
spring.threads.virtual.enabled=true
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000

# Puertos del Servidor
# Puerto para el Frontend (REST)
server.port=8080
# Puerto exclusivo para el Router (gRPC)
grpc.server.port=9090

spring.config.import=optional:file:application-secrets.properties
logging.level.org.springframework.security=TRACE